#
# tmux configuration
# Tangled from README.org
#

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Eliminate ESC delay (critical for nvim inside tmux)
set -sg escape-time 0

# Bigger scrollback
set -g history-limit 50000

# Start numbering at 1 (0 is across the keyboard)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Don't let tmux auto-rename windows after you've named them
set -g allow-rename off
setw -g automatic-rename off

# Mouse support
set -g mouse on

# Copy mouse selection to system clipboard automatically
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Focus events (lets nvim detect focus for autoread, etc.)
set -g focus-events on

# Don't detach when you destroy a session
set -g detach-on-destroy off

# Prefix: C-b (default, keeping it standard)
bind C-b send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Splits: | for vertical, - for horizontal (in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Status bar position and refresh
set -g status-position bottom
set -g status-interval 5

# XDG-compliant plugin path
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Smooth scrolling (tuned to match Alacritty multiplier = 3)
set -g @plugin 'azorng/tmux-smooth-scroll'
set -g @smooth-scroll-speed "80"
set -g @smooth-scroll-easing "sine"
set -g @smooth-scroll-normal "3"
set -g @smooth-scroll-mouse "true"

# Session persistence (save: C-b Ctrl-s, restore: C-b Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# URL picker (C-b u to pick URLs from current pane)
set -g @plugin 'wfxr/tmux-fzf-url'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Show window name (#W) instead of path for both active and inactive windows
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"

# Status line modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# Test
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'wfxr/tmux-fzf-url'

# Initialize TPM (KEEP THIS AT THE VERY BOTTOM)
run '~/.config/tmux/plugins/tpm/tpm'
